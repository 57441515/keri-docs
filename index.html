<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#4ECDC4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Keri Docs">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
<title>Keri Docs</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#4ECDC4;--cyan-dark:#2BB5AC;--dark:#0D1117;--dark2:#161B22;
  --dark3:#1C2330;--dark4:#21262D;--border:rgba(78,205,196,0.18);
  --text:#E6EDF3;--muted:#7D8590;--silver:#C9D1D9;
  --danger:#FF6B6B;--success:#56D364;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(78,205,196,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 80%,rgba(78,205,196,0.07) 0%,transparent 60%);pointer-events:none;}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--dark);padding:16px;}
.login-card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 0 60px rgba(78,205,196,0.08);position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.logo-wrap{text-align:center;margin-bottom:28px;}
.login-logo{width:120px;height:auto;object-fit:contain;filter:drop-shadow(0 0 20px rgba(78,205,196,0.4));margin-bottom:12px;}
.logo-title{font-family:'DM Serif Display',serif;font-size:26px;}
.logo-title em{color:var(--cyan);font-style:normal;}
.logo-sub{font-size:12px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.tab-row{display:flex;gap:4px;background:var(--dark3);border-radius:10px;padding:4px;margin-bottom:24px;}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);border-radius:7px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;transition:all .2s;}
.tab-btn.active{background:var(--dark4);color:var(--cyan);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select{width:100%;padding:10px 13px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:all .2s;}
.fg input:focus,.fg select:focus{border-color:var(--cyan);}
.fg select option{background:var(--dark3);}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));border:none;border-radius:10px;color:var(--dark);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(78,205,196,0.3);}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
#app.on{display:flex;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,17,23,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:58px;}
.topbar-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.topbar-logo img{height:36px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(78,205,196,0.4));}
.topbar-logo span{font-family:'DM Serif Display',serif;font-size:19px;}
.topbar-logo em{color:var(--cyan);font-style:normal;}
.topbar-space{flex:1;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--dark);}
.btn-logout{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.ham{display:none;background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px;}
@media(max-width:768px){.ham{display:flex;}}

/* LAYOUT */
.body-wrap{display:flex;flex:1;min-height:0;}
.sidebar{background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;width:250px;flex-shrink:0;}
@media(max-width:768px){
  .sidebar{display:none;position:fixed;top:58px;left:0;bottom:0;width:80vw;max-width:270px;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,0.5);}
  .sidebar.open{display:flex;}
  .body-wrap{display:block;}
  .content{width:100%;}
}
.sb-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent;}
.sb-overlay.on{display:block;}
.sb-sec{padding:0 12px;margin-bottom:20px;}
.sb-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding:0 8px;}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:var(--silver);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.sb-btn:hover{background:var(--dark3);color:var(--text);}
.sb-btn.on{background:rgba(78,205,196,0.1);color:var(--cyan);}
.sb-btn .ic{font-size:15px;width:18px;text-align:center;}
.cl-list{padding:0 12px;flex:1;overflow-y:auto;}
.cl-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .2s;margin-bottom:2px;}
.cl-item:hover{background:var(--dark3);}
.cl-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);flex-shrink:0;}
.cl-name{font-size:13px;color:var(--silver);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cl-cnt{font-size:10px;color:var(--muted);background:var(--dark4);padding:1px 5px;border-radius:8px;}

/* CONTENT */
.content{padding:24px;overflow-y:auto;flex:1;}
.page{display:none;}
.page.on{display:block;}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.pt{font-family:'DM Serif Display',serif;font-size:24px;}
.pt span{color:var(--cyan);}
.pa{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-c{background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));color:var(--dark);}
.btn-c:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(78,205,196,0.3);}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--silver);}
.btn-g:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-d{background:transparent;border:1px solid rgba(255,107,107,0.3);color:var(--danger);}
.btn-d:hover{background:rgba(255,107,107,0.1);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-n{font-size:26px;font-weight:700;color:var(--cyan);line-height:1;}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;}

/* CLIENT CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.cc{background:var(--dark2);border:1px solid var(--border);border-radius:13px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.cc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--cyan-dark));opacity:0;transition:.2s;}
.cc:hover{border-color:rgba(78,205,196,0.4);transform:translateY(-2px);}
.cc:hover::before{opacity:1;}
.cc-av{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(78,205,196,0.2),rgba(43,181,172,0.1));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;}
.cc-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.cc-email{font-size:12px;color:var(--muted);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-pass{font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:4px;}
.cc-pass span{color:var(--cyan);font-family:monospace;font-size:12px;}
.cc-meta{display:flex;gap:8px;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 8px;border-radius:16px;background:rgba(78,205,196,0.1);color:var(--cyan);border:1px solid rgba(78,205,196,0.2);}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
.bc-i{font-size:13px;color:var(--muted);cursor:pointer;}
.bc-i:hover{color:var(--cyan);}
.bc-i.on{color:var(--text);cursor:default;}
.bc-sep{color:var(--border);font-size:11px;}

/* CLIENT HEADER */
.ch{background:var(--dark2);border:1px solid var(--border);border-radius:13px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.ch-av{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(78,205,196,0.25),rgba(43,181,172,0.1));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;}
.ch-name{font-size:18px;font-weight:600;margin-bottom:2px;}
.ch-email{font-size:12px;color:var(--muted);}

/* FOLDERS */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.fc{background:var(--dark2);border:1px solid var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;}
.fc:hover{border-color:rgba(78,205,196,0.4);background:var(--dark3);}
.fc-icon{font-size:32px;}
.fc-name{font-size:12px;font-weight:500;text-align:center;word-break:break-word;}
.fc-cnt{font-size:11px;color:var(--muted);}
.fc-del{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s;}
.fc:hover .fc-del{opacity:1;}
.fc-del:hover{background:rgba(255,107,107,0.15);color:var(--danger);}

/* DOCS TABLE */
.dtw{background:var(--dark2);border:1px solid var(--border);border-radius:13px;overflow:hidden;}
.dt{width:100%;border-collapse:collapse;}
.dt th{padding:11px 14px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--dark3);}
.dt td{padding:13px 14px;border-bottom:1px solid rgba(30,40,50,0.8);font-size:13px;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:rgba(78,205,196,0.02);}
.doc-n{display:flex;align-items:center;gap:7px;}
.da{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap;}
.ftb{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.ftb-pdf{background:rgba(255,107,107,0.15);color:#FF8F8F;}
.ftb-word{background:rgba(78,120,205,0.15);color:#7EA8F8;}
.ftb-excel{background:rgba(86,211,100,0.15);color:#56D364;}
.ftb-img{background:rgba(227,179,65,0.15);color:#E3B341;}
.ftb-other{background:var(--dark4);color:var(--muted);}

/* UPLOAD */
.uz{border:2px dashed var(--border);border-radius:13px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--dark2);margin-bottom:16px;display:block;}
.uz:hover,.uz.dv{border-color:var(--cyan);background:rgba(78,205,196,0.04);}
.uz-icon{font-size:36px;margin-bottom:8px;}
.uz-text{font-size:14px;color:var(--muted);}
.uz-text strong{color:var(--cyan);}
.prog{height:3px;background:var(--dark3);border-radius:2px;margin-top:8px;overflow:hidden;display:none;}
.prog-f{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--cyan-dark));transition:width .2s;}

/* MODAL */
.mo{position:fixed;inset:0;z-index:200;display:none;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;}
.mo.on{display:flex;}
.md{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:440px;position:relative;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.md-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:18px;}
.mc{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.mc:hover{background:var(--dark3);color:var(--text);}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* DOC VIEWER */
.md-view{max-width:840px;width:96vw;max-height:92vh;display:flex;flex-direction:column;}
.dv-body{flex:1;overflow:auto;border-radius:9px;background:var(--dark3);min-height:300px;display:flex;align-items:center;justify-content:center;}

/* SEARCH */
.search{display:flex;align-items:center;gap:7px;background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;}
.search input{background:transparent;border:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;flex:1;min-width:100px;}
.search input::placeholder{color:var(--muted);}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty-ic{font-size:48px;margin-bottom:10px;opacity:.35;}
.empty-t{font-size:15px;color:var(--muted);margin-bottom:4px;}
.empty-s{font-size:12px;color:var(--muted);opacity:.6;}

/* TOAST */
.ta{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--dark2);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,0.4);min-width:200px;display:flex;align-items:center;gap:10px;animation:tIn .3s ease;}
@keyframes tIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.toast.ok{border-color:rgba(86,211,100,0.3);}
.toast.err{border-color:rgba(255,107,107,0.3);}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.toast.ok .td{background:var(--success);}
.toast.err .td{background:var(--danger);}

/* FOOTER */
.footer{text-align:center;padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);background:var(--dark2);flex-shrink:0;letter-spacing:.3px;}
.footer strong{color:var(--cyan);}

/* CHANGE PASSWORD */
.pass-strength{height:3px;border-radius:2px;margin-top:4px;transition:all .3s;}

@media(max-width:600px){
  .content{padding:14px;}
  .ph{flex-direction:column;align-items:flex-start;}
  .grid{grid-template-columns:1fr;}
  .fgrid{grid-template-columns:repeat(2,1fr);}
  .dt th:nth-child(3),.dt td:nth-child(3),.dt th:nth-child(4),.dt td:nth-child(4){display:none;}
  .da{flex-direction:column;}
  .md{padding:18px 14px;}
}
</style>
</head>
<body>

<!-- OVERLAY -->
<div class="sb-overlay" id="sb-ov" onclick="closeSB()"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo-wrap">
      <img class="login-logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEfCAYAAAD7k/t2AAAKHmlDQ1BJQ0MgUHJvZmlsZQAAeJy1Vnk8lGsbft73nX2xzZDd2LdGljDIvpPITpsxMxjLYMyg0iapcCJJthI5FTp0Wp[...]
      <div class="logo-title">Keri <em>Docs</em></div>
      <div class="logo-sub">Document Portal</div>
    </div>
    <div class="tab-row">
      <button type="button" class="tab-btn active" id="tab-a" onclick="switchTab('a')">Administrador</button>
      <button type="button" class="tab-btn" id="tab-c" onclick="switchTab('c')">Cliente</button>
    </div>
    <div id="form-a">
      <div class="fg"><label>Usuario</label><input id="a-user" type="text" placeholder="keri" autocomplete="username"></div>
      <div class="fg"><label>Contraseña</label><input id="a-pass" type="password" placeholder="••••••" autocomplete="current-password"></div>
      <button type="button" class="btn-primary" onclick="doLogin('a')">Entrar</button>
    </div>
    <div id="form-c" style="display:none">
      <div class="fg"><label>Tu empresa</label><select id="c-sel"></select></div>
      <div class="fg"><label>Contraseña</label><input id="c-pass" type="password" placeholder="••••••" autocomplete="current-password"></div>
      <button type="button" class="btn-primary" onclick="doLogin('c')">Acceder</button>
    </div>
    <div class="login-err" id="login-err">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <button type="button" class="ham" onclick="toggleSB()">☰</button>
    <a class="topbar-logo" href="#">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAABfCAYAAABvC8zhAAAKHmlDQ1BJQ0MgUHJvZmlsZQAAeJy1Vnk8lGsbft73nX2xzZDd2LdGljDIvpPITpsxMxjLYMyg0iapcCJJthI5FTp0WpDTIi3ajtKmos7IEarT0[...]
      <span>Keri <em>Docs</em></span>
    </a>
    <div class="topbar-space"></div>
    <div class="avatar" id="t-av">K</div>
    <span id="t-name" style="font-size:13px;color:var(--silver);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button type="button" class="btn-logout" onclick="logout()">Salir</button>
  </div>

  <div class="body-wrap">
    <!-- SIDEBAR ADMIN -->
    <div class="sidebar" id="sb-a">
      <div class="sb-sec">
        <div class="sb-lbl">Menú</div>
        <button type="button" class="sb-btn on" onclick="goAdmin('dashboard')"><span class="ic">📊</span>Dashboard</button>
        <button type="button" class="sb-btn" onclick="goAdmin('clients')"><span class="ic">👥</span>Clientes</button>
      </div>
      <div class="sb-sec"><div class="sb-lbl">Documentos</div></div>
      <div class="cl-list" id="sb-cl"></div>
    </div>

    <!-- SIDEBAR CLIENT -->
    <div class="sidebar" id="sb-c">
      <div class="sb-sec">
        <div class="sb-lbl">Mis documentos</div>
        <button type="button" class="sb-btn on" onclick="showClientFolders()"><span class="ic">🏠</span>Inicio</button>
      </div>
      <div class="sb-sec" id="sb-cf"></div>
      <div class="sb-sec" style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border)">
        <button type="button" class="sb-btn" onclick="openModal('mo-chpass')"><span class="ic">🔑</span>Cambiar contraseña</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content">

      <!-- ADMIN DASHBOARD -->
      <div class="page on" id="pg-dashboard">
        <div class="ph"><div class="pt">Dashboard <span>Keri</span></div></div>
        <div class="stats" id="a-stats"></div>
        <div style="font-size:16px;font-weight:600;color:var(--silver);margin-bottom:14px">Clientes recientes</div>
        <div class="grid" id="a-quick"></div>
      </div>

      <!-- ADMIN CLIENTS -->
      <div class="page" id="pg-clients">
        <div class="ph">
          <div class="pt">Gestión de <span>Clientes</span></div>

async function loadClients() {
  try {
    const snap = await db.collection('clients').orderBy('name').get();
    if(snap.empty) {
      const defaults = [
        {id:'c1',name:'Distribuciones López',email:'lopez@empresa.com',pass:'lopez123',passChanged:false},
        {id:'c2',name:'Tech Soluciones S.L.',email:'info@techsol.com',pass:'tech2024',passChanged:false},
        {id:'c3',name:'Consultoría Ramos',email:'ramos@consultoria.es',pass:'ramos2024',passChanged:false}
      ];
      for(const c of defaults) await db.collection('clients').doc(c.id).set(c);
      DB.clients = defaults.map(c=>(({...c,folders:{}})));
    } else {
      DB.clients = [];
      for(const doc of snap.docs) {
        const c = doc.data();
        const fSnap = await db.collection('clients').doc(c.id).collection('folders').orderBy('name').get();
        c.folders = {};
        for(const fd of fSnap.docs) {
          const f = fd.data();
          const dSnap = await db.collection('clients').doc(c.id).collection('folders').doc(f.id).collection('docs').get();
          f.docs = dSnap.docs.map(d=>d.data());
          c.folders[f.id] = f;
        }
        DB.clients.push(c);
      }
    }
    populateSelect();
  } catch(e) {
    console.error(e);
    toast('Error conectando con la base de datos','err');
  }
}

async function dbSaveClient(c) {
  const {folders,...d} = c;
  await db.collection('clients').doc(c.id).set(d);
}

async function dbSaveFolder(cid, f) {
  const {docs,...d} = f;
  await db.collection('clients').doc(cid).collection('folders').doc(f.id).set(d);
}

async function dbSaveDoc(cid, fid, doc) {
  // Split large files into chunks to bypass Firestore 1MB limit
  const MAX = 700000; // ~700KB per chunk
  const data = doc.data || null;
  const meta = {id:doc.id,name:doc.name,type:doc.type,size:doc.size,date:doc.date,chunks:0};

  if(data && data.length > MAX) {
    // Store in chunks
    const numChunks = Math.ceil(data.length / MAX);
    meta.chunks = numChunks;
    for(let i=0;i<numChunks;i++) {
      await db.collection('clients').doc(cid).collection('folders').doc(fid)
        .collection('docs').doc(doc.id).collection('chunks').doc('c'+i)
        .set({i, d: data.slice(i*MAX,(i+1)*MAX)});
    }
  } else {
    meta.data = data;
  }
  await db.collection('clients').doc(cid).collection('folders').doc(fid).collection('docs').doc(doc.id).set(meta);
}

async function dbGetDocData(cid, fid, docId, chunks) {
  if(!chunks || chunks === 0) return null;
  let data = '';
  for(let i=0;i<chunks;i++) {
    const snap = await db.collection('clients').doc(cid).collection('folders').doc(fid)
      .collection('docs').doc(docId).collection('chunks').doc('c'+i).get();
    data += snap.data().d;
  }
  return data;
}

async function dbDelDoc(cid, fid, docId, chunks) {
  if(chunks > 0) {
    for(let i=0;i<chunks;i++) {
      await db.collection('clients').doc(cid).collection('folders').doc(fid)
        .collection('docs').doc(docId).collection('chunks').doc('c'+i).delete();
    }
  }
  await db.collection('clients').doc(cid).collection('folders').doc(fid).collection('docs').doc(docId).delete();
}

async function dbDelFolder(cid, fid) {
  const dSnap = await db.collection('clients').doc(cid).collection('folders').doc(fid).collection('docs').get();
  for(const d of dSnap.docs) {
    const dd = d.data();
    await dbDelDoc(cid, fid, dd.id, dd.chunks||0);
  }
  await db.collection('clients').doc(cid).collection('folders').doc(fid).delete();
}

function doLogin(role) {

function startSession(role,cid) {

  } else {

    document.getElementById('t-av').textContent=c.name[0].toUpperCase();
    document.getElementById('t-name').textContent=c.name;

        openModal('mo-chpass');
      },800);
    }

}

  if(!fid) {
    cont.innerHTML=folders.length===0
      ?`<div class="empty"><div class="empty-ic">📁</div><div class="empty-t">No tienes documentos todavía</div><div class="empty-s">Keri te irá añadiendo carpetas y documentos</div></div>`
      :`<div class="ph"><div class="pt">Mis <span>Carpetas</span></div></div>
        <div class="fgrid">${folders.map(f=>`
          <div class="fc" onclick="showClientFolders('${f.id}')">
            <div class="fc-icon">📁</div>
            <div class="fc-name">${f.name}</div>
            <div class="fc-cnt">${f.docs.length} documentos</div>
          </div>`).join('')}</div>`;
  } else {
    const folder=client.folders[fid];
    let h=`<div class="ph"><div class="pt">📁 <span>${folder.name}</span></div></div>`;
    h+=folder.docs.length===0
      ?`<div class="empty"><div class="empty-ic">📄</div><div class="empty-t">Carpeta vacía</div></div>`
      :`<div class="dtw"><table class="dt">
          <thead><tr><th>Documento</th><th>Tipo</th><th>Tamaño</th><th>Fecha</th><th style="text-align:right">Acciones</th></tr></thead>
          <tbody>${folder.docs.map(d=>docRow(d,'client')).join('')}</tbody>
        </table></div>`;
    cont.innerHTML=h;
  }
  showPg('client');
}

// ═══ DOC ROW ═══
function docRow(d, mode) {
  const ic=tIcon(d.type);
  const actions=mode==='admin'
    ?`<button type="button" class="btn btn-g btn-sm" onclick="viewDoc('${d.id}')">👁 Ver</button>
      <button type="button" class="btn btn-g btn-sm" onclick="dlDoc('${d.id}')">⬇ PDF</button>
      <button type="button" class="btn btn-d btn-sm" onclick="delDoc('${d.id}')">🗑</button>`
    :`<button type="button" class="btn btn-c btn-sm" onclick="viewDoc('${d.id}')">👁 Ver</button>
      <button type="button" class="btn btn-g btn-sm" onclick="dlDoc('${d.id}')">⬇ PDF</button>`;
  return `<tr>
    <td><div class="doc-n"><span>${ic}</span>${d.name}</div></td>
    <td><span class="ftb ftb-${d.type}">${d.type.toUpperCase()}</span></td>
    <td style="color:var(--muted)">${d.size}</td>
    <td style="color:var(--muted)">${d.date}</td>
    <td><div class="da">${actions}</div></td></tr>`;
}
function tIcon(t){return{pdf:'📕',word:'📘',excel:'📗',img:'🖼️',pptx:'📙'}[t]||'📄';}
function extType(n){
  const e=n.split('.').pop().toLowerCase();
  if(e==='pdf') return 'pdf';
  if(['doc','docx'].includes(e)) return 'word';
  if(['xls','xlsx','csv'].includes(e)) return 'excel';
  if(['png','jpg','jpeg','gif','webp','svg'].includes(e)) return 'img';
  if(['ppt','pptx'].includes(e)) return 'pptx';
  return 'other';
}

// ═══ FIND DOC ═══
function findDoc(docId) {
  const client=DB.clients.find(c=>c.id===S.cid);
  if(!client) return null;
  for(const f of Object.values(client.folders)) {
    const d=f.docs.find(x=>x.id===docId);
    if(d) return {doc:d, fid:Object.keys(client.folders).find(k=>client.folders[k]===f)};
  }
  return null;
}

// ═══ VIEW DOC ═══
async function viewDoc(docId) {
  const res=findDoc(docId);
  if(!res){toast('Documento no encontrado','err');return;}
  const {doc,fid}=res;
  document.getElementById('view-title').textContent=doc.name;
  document.getElementById('view-dl').onclick=()=>dlDoc(docId);
  const body=document.getElementById('view-body');
  body.innerHTML=`<div style="text-align:center;padding:30px"><div style="font-size:40px">⏳</div><div style="color:var(--muted);margin-top:8px;font-size:13px">Cargando...</div></div>`;
  openModal('mo-view');

  // Get data (may need to reassemble chunks)
  let data = doc.data || null;
  if(!data && doc.chunks > 0) {
    data = await dbGetDocData(S.cid, fid, doc.id, doc.chunks);
    doc.data = data; // cache
  }

  if(data) {
    if(doc.type==='pdf') {
      const isMobile=/iPhone|iPad|Android/i.test(navigator.userAgent);
      if(isMobile) {
        body.innerHTML=`<div style="text-align:center;padding:40px 20px">
          <div style="font-size:52px;margin-bottom:14px">📕</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:6px">${doc.name}</div>
          <div style="color:var(--muted);font-size:12px;margin-bottom:20px">${doc.size} · ${doc.date}</div>
          <button type="button" onclick="openPDF('${docId}')" class="btn btn-c" style="width:180px;justify-content:center">📖 Abrir PDF</button>
        </div>`;
      } else {
        const iframe=document.createElement('iframe');
        iframe.src=data; iframe.style.cssText='width:100%;height:62vh;border:none;border-radius:8px;';
        body.innerHTML=''; body.appendChild(iframe);
      }
    } else if(doc.type==='img') {
      const img=document.createElement('img');
      img.src=data; img.style.cssText='max-width:100%;max-height:62vh;border-radius:8px;object-fit:contain;';
      body.innerHTML=''; body.appendChild(img);
    } else {
      body.innerHTML=`<div style="text-align:center;padding:40px 20px">
        <div style="font-size:52px;margin-bottom:14px">${tIcon(doc.type)}</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:6px">${doc.name}</div>
        <div style="color:var(--muted);font-size:12px;margin-bottom:20px">${doc.size} · ${doc.date}</div>
        <button type="button" onclick="dlDoc('${docId}')" class="btn btn-c" style="justify-content:center">⬇ Descargar para ver</button>
      </div>`;
    }
  } else {
    body.innerHTML=`<div style="text-align:center;padding:40px 20px">
      <div style="font-size:52px;margin-bottom:14px">${tIcon(doc.type)}</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">${doc.name}</div>
      <div style="color:var(--muted);font-size:12px">${doc.size} · ${doc.date}</div>
    </div>`;
  }
}

function openPDF(docId) {
  const res=findDoc(docId); if(!res) return;
  const data=res.doc.data; if(!data) return;
  const b=atob(data.split(',')[1]);
  const ab=new ArrayBuffer(b.length); const ia=new Uint8Array(ab);
  for(let i=0;i<b.length;i++) ia[i]=b.charCodeAt(i);
  const blob=new Blob([ab],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  window.open(url,'_blank');
  setTimeout(()=>URL.revokeObjectURL(url),15000);
}

// ═══ DOWNLOAD ═══
async function dlDoc(docId) {
  const res=findDoc(docId);
  if(!res){toast('Documento no encontrado','err');return;}
  const {doc,fid}=res;
  let data=doc.data||null;
  if(!data && doc.chunks>0) {
    toast('Descargando...','ok');
    data=await dbGetDocData(S.cid,fid,doc.id,doc.chunks);
    doc.data=data;
  }
  if(!data){toast('Sin datos para descargar','err');return;}
  const a=document.createElement('a');
  a.href=data; a.download=doc.name; a.click();
  toast('Descarga iniciada','ok');
}

// ═══ CRUD FOLDERS ═══
async function addFolder() {
  const name=document.getElementById('nf-n').value.trim();
  if(!name){toast('Escribe un nombre','err');return;}
  const client=DB.clients.find(c=>c.id===S.cid);
  const fid='f'+Date.now();
  const f={id:fid,name,docs:[]};
  client.folders[fid]=f;
  await dbSaveFolder(S.cid,f);
  closeModal('mo-nf');
  document.getElementById('nf-n').value='';
  openClientDocs(S.cid); renderSBClients();
  toast('Carpeta creada','ok');
}

function delFolder(cid,fid) {
  confirm2('¿Eliminar esta carpeta y todos sus documentos?',async()=>{
    delete DB.clients.find(c=>c.id===cid).folders[fid];
    await dbDelFolder(cid,fid);
    openClientDocs(cid); renderSBClients();
    toast('Carpeta eliminada','ok');
  });
}

// ═══ CRUD DOCS ═══
function delDoc(docId) {
  const res=findDoc(docId); if(!res) return;
  confirm2('¿Eliminar este documento?',async()=>{
    const client=DB.clients.find(c=>c.id===S.cid);
    const folder=client.folders[res.fid];
    folder.docs=folder.docs.filter(d=>d.id!==docId);
    await dbDelDoc(S.cid,res.fid,docId,res.doc.chunks||0);
    openClientDocs(S.cid,S.fid);
    toast('Documento eliminado','ok');
  });
}

// ═══ UPLOAD ═══
function dOver(e){e.preventDefault();document.getElementById('uz').classList.add('dv');}
function dLeave(){document.getElementById('uz').classList.remove('dv');}
function dDrop(e){e.preventDefault();dLeave();const f=e.dataTransfer.files[0];if(f)procFile(f);}
function fileSel(e){const f=e.target.files[0];if(f)procFile(f);}
function procFile(f){
  if(f.size>5*1024*1024){toast('Archivo muy grande. Máximo 5MB','err');return;}
  S.file=f;
  document.getElementById('uz').style.display='none';
  document.getElementById('fp').style.display='block';
  document.getElementById('fp-ic').textContent=tIcon(extType(f.name));
  document.getElementById('fp-n').textContent=f.name;
  document.getElementById('fp-s').textContent=fmtSize(f.size);
}
function clearFile(){
  S.file=null;
  document.getElementById('uz').style.display='block';
  document.getElementById('fp').style.display='none';
  try{document.getElementById('fi').value='';}catch(e){}
}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(0)+' KB';return(b/1048576).toFixed(1)+' MB';}

async function uploadFile(){
  if(!S.file){toast('Selecciona un archivo','err');return;}
  const f=S.file;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const data=e.target.result;
    const docId='d'+Date.now();
    const type=extType(f.name);
    const size=fmtSize(f.size);
    const date=new Date().toLocaleDateString('es-ES');
    const doc={id:docId,name:f.name,type,size,date,data};
    const btn=document.getElementById('btn-up');
    btn.disabled=true; btn.textContent='⬆ Subiendo...';
    document.getElementById('uprog').style.display='block';
    try {
      await dbSaveDoc(S.cid,S.fid,doc);
      const client=DB.clients.find(c=>c.id===S.cid);
      client.folders[S.fid].docs.push(doc);
      closeModal('mo-up'); clearFile();
      openClientDocs(S.cid,S.fid);
      toast('Documento subido correctamente','ok');
    } catch(err) {
      console.error('uploadFile error:',err);
      toast('Error: '+err.message,'err');
    } finally {
      btn.disabled=false; btn.textContent='⬆ Subir';
      document.getElementById('uprog').style.display='none';
    }
  };
  reader.readAsDataURL(f);
}

// ═══ MODAL ═══
function openModal(id) {
  document.getElementById(id).classList.add('on');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('on');
}

// ═══ TOAST ═══
function toast(msg, type) {
  const container=document.getElementById('ta');
  const t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=`<div class="td"></div><span>${msg}</span>`;
  container.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ═══ CONFIRM ═══
function confirm2(msg,cb) {
  document.getElementById('del-txt').textContent=msg;
  document.getElementById('del-ok').onclick=cb;
  openModal('mo-del');
}

// ═══ PASSWORD STRENGTH ═══
function checkPassStrength() {
  const p=document.getElementById('cp-new').value;
  const bar=document.getElementById('ps-bar');
  let strength=0;
  if(p.length>=8) strength++;
  if(/[a-z]/.test(p)&&/[A-Z]/.test(p)) strength++;
  if(/\d/.test(p)) strength++;
  if(/[^a-zA-Z\d]/.test(p)) strength++;
  const colors=['','#FF6B6B','#E3B341','#56D364','#4ECDC4'];
  bar.style.background=colors[strength];
  bar.style.width=(strength/4)*100+'%';
}

// ═══ CHANGE PASSWORD ═══
async function changePassword() {
  const old=document.getElementById('cp-old').value;
  const newP=document.getElementById('cp-new').value;
  const rep=document.getElementById('cp-rep').value;
  if(!old||!newP||!rep){toast('Rellena todos los campos','err');return;}
  if(newP!==rep){toast('Las nuevas contraseñas no coinciden','err');return;}
  if(newP.length<6){toast('Mínimo 6 caracteres','err');return;}
  const client=DB.clients.find(c=>c.id===S.cid);
  if(old!==client.pass){toast('Contraseña actual incorrecta','err');return;}
  try {
    client.pass=newP;
    client.passChanged=true;
    await dbSaveClient(client);
    closeModal('mo-chpass');
    ['cp-old','cp-new','cp-rep'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('ps-bar').style.width='0';
    toast('Contraseña cambiada correctamente','ok');
  } catch(e) {
    console.error(e);
    toast('Error: '+e.message,'err');
  }
}
